<header class="header" [class.header--scrolled]="isScrolled()" role="banner">
  <nav class="header__nav container" aria-label="Navegação principal">
    <!-- Logo -->
    <a
      routerLink="/"
      class="header__logo"
      aria-label="NogueTech – Página inicial"
      (click)="closeMenu()"
    >
      <img
        src="../../../assets/logo-noguetech.webp"
        alt="NogueTech Logo"
        class="header__logo-img"
        height="40"
      />
    </a>

    <!-- Desktop links -->
    <ul class="header__links" role="list">
      @for (item of navItems; track item.path) {
        <li>
          <a
            [routerLink]="item.path"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.exact }"
            class="header__link"
            (click)="closeMenu()"
            >{{ item.label }}</a
          >
        </li>
      }
    </ul>

    <!-- CTA desktop -->
    <a routerLink="/contato" class="btn btn-primary header__cta" (click)="closeMenu()">
      Solicitar Orçamento
    </a>

    <!-- Hamburger -->
    <button
      class="header__hamburger"
      [class.header__hamburger--open]="isMenuOpen()"
      [attr.aria-expanded]="isMenuOpen()"
      aria-controls="mobile-nav"
      aria-label="Abrir menu de navegação"
      (click)="toggleMenu()"
      type="button"
    >
      <span class="line"></span>
      <span class="line"></span>
      <span class="line"></span>
    </button>
  </nav>

  <!-- Mobile drawer -->
  <div
    id="mobile-nav"
    class="header__mobile"
    [class.header__mobile--open]="isMenuOpen()"
    role="dialog"
    aria-modal="true"
    aria-label="Menu de navegação"
  >
    <ul role="list" class="mobile__links">
      @for (item of navItems; track item.path) {
        <li>
          <a
            [routerLink]="item.path"
            routerLinkActive="mobile__link--active"
            [routerLinkActiveOptions]="{ exact: item.exact }"
            class="mobile__link"
            (click)="closeMenu()"
            >{{ item.label }}</a
          >
        </li>
      }
    </ul>
    <a routerLink="/contato" class="btn btn-primary btn-lg mobile__cta" (click)="closeMenu()">
      Solicitar Orçamento
    </a>
  </div>

  <!-- Overlay -->
  @if (isMenuOpen()) {
    <div class="header__overlay" (click)="closeMenu()" aria-hidden="true"></div>
  }
</header>
